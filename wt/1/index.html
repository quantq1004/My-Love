<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <title>💖 Quỳnh Trang 💖</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        /* TITLE */

        .title {
            margin-top: 60px;
            font-size: 42px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 20px;
            opacity: 0.9;
        }

        /* HEART (GIẢM KÍCH CỠ) */

        #heart {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 80px auto;
            transform: rotate(45deg);
            background: #ff2e63;
            animation: beat 1s infinite;
            cursor: pointer;
            box-shadow: 0 0 30px #ff2e63;
        }

        #heart:before,
        #heart:after {
            content: '';
            position: absolute;
            width: 140px;
            height: 140px;
            background: #ff2e63;
            border-radius: 50%;
        }

        #heart:before {
            top: -70px;
            left: 0;
        }

        #heart:after {
            left: -70px;
            top: 0;
        }

        @keyframes beat {
            0% {
                transform: scale(1) rotate(45deg)
            }

            50% {
                transform: scale(1.1) rotate(45deg)
            }

            100% {
                transform: scale(1) rotate(45deg)
            }
        }

        /* MESSAGE */

        #message {
            display: none;
            font-size: 28px;
            margin-top: 20px;
        }

        /* TIMER */

        #timer {
            margin-top: 20px;
            font-size: 22px;
        }

        /* BUTTON */

        .go-btn {
            margin-top: 30px;
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #ff2e63;
            font-weight: bold;
            border-radius: 30px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .go-btn:hover {
            transform: scale(1.1);
        }

        .go-btn1 {
            margin-top: 30px;
            margin-bottom: 30px;
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #ff2e63;
            font-weight: bold;
            border-radius: 30px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .go-btn1:hover {
            transform: scale(1.1);
        }


        /* FLOWERS */

        /* FLOWER RANDOM FLY */

        .flower {
            position: fixed;
            font-size: 22px;
            pointer-events: none;
            animation: flowerFly linear forwards;
        }

        @keyframes flowerFly {

            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1;
            }

            25% {
                transform: translate(40px, 120px) rotate(90deg);
            }

            50% {
                transform: translate(-40px, 260px) rotate(180deg);
            }

            75% {
                transform: translate(60px, 420px) rotate(270deg);
            }

            100% {
                transform: translate(-30px, 600px) rotate(360deg);
                opacity: 0;
            }

        }

        @keyframes fall {
            to {
                transform: translateY(110vh);
            }
        }

        /* MUSIC PLAYER */

        .music-player {

            position: fixed;
            right: 20px;
            bottom: 20px;

            display: flex;
            align-items: center;
            gap: 10px;

            background: rgba(255, 255, 255, 0.2);
            padding: 10px 15px;
            border-radius: 30px;
            backdrop-filter: blur(10px);

        }

        /* DISK */

        .disk {

            width: 50px;
            height: 50px;
            border-radius: 50%;

            background: url("music.png");
            background-size: cover;

            animation: spin 4s linear infinite;
            animation-play-state: paused;

        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        /* SONG NAME */

        .song-name {
            font-size: 14px;
        }

        /* PLAY BUTTON */

        .play-btn {

            background: white;
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;

        }
    </style>

</head>

<body>

    <div class="title">
        💕 Quỳnh Trang 💕
    </div>

    <div class="subtitle">
        Every time I see you, my heart beats faster
    </div>

    <div id="heart"></div>

    <div id="message">
        Anh yêu em rất nhiều 💖
    </div>

    <div id="timer"></div>

    <a class="go-btn1">
        Ngày kỷ niệm: 12-03-2026 💌
    </a>


    <!-- MUSIC PLAYER -->

    <div class="music-player">

        <div class="disk" id="disk"></div>

        <div class="song-name">
            Tình cờ tôi thích em 🎵
        </div>

        <button class="play-btn" id="playBtn" onclick="toggleMusic()">
            Play
        </button>

    </div>

    <audio preload="auto" id="bgm" loop>
        <source src="tinhcotoithichem.mp3">
    </audio>

    <script>

        /* HEART CLICK */

        document.getElementById("heart").onclick = function () {

            document.getElementById("message").style.display = "block"

        }

        /* TIMER */

        var start = new Date("2026-03-12T00:00:00")


        function format(n) {
            return n.toString().padStart(2, '0')
        }

        function update() {

            var now = new Date()
            var diff = now - start

            var days = Math.floor(diff / 1000 / 60 / 60 / 24)
            var hours = Math.floor(diff / 1000 / 60 / 60) % 24
            var minutes = Math.floor(diff / 1000 / 60) % 60
            var seconds = Math.floor(diff / 1000) % 60

            document.getElementById("timer").innerHTML =
                "💖 Anh và em đã bên nhau 💖 <br>" +
                "📆 " + days + " ngày  " +
                "🕒 " + format(hours) + " giờ  " +
                "⏰ " + format(minutes) + " phút  " +
                "⏱ " + format(seconds) + " giây"
        }


        setInterval(update, 1000)

        /* FLOWERS */

        function flower() {

            let f = document.createElement("div")

            f.className = "flower"

            let items = ["🌸", "🌺", "💮", "💕", "💖", "😍"]

            f.innerHTML = items[Math.floor(Math.random() * items.length)]

            /* random start position */

            let side = Math.floor(Math.random() * 3)

            if (side == 0) {
                f.style.left = Math.random() * 100 + "vw"
                f.style.top = "-20px"
            }
            else if (side == 1) {
                f.style.left = "-20px"
                f.style.top = Math.random() * 80 + "vh"
            }
            else {
                f.style.left = "100vw"
                f.style.top = Math.random() * 80 + "vh"
            }

            f.style.animationDuration = (6 + Math.random() * 4) + "s"

            document.body.appendChild(f)

            setTimeout(() => f.remove(), 10000)

        }

        setInterval(flower, 250)


        const music = document.getElementById("bgm")
        const disk = document.getElementById("disk")
        const btn = document.getElementById("playBtn")

        function toggleMusic() {

            if (music.paused) {

                music.play()
                disk.style.animationPlayState = "running"
                btn.innerHTML = "Pause"

            } else {

                music.pause()
                disk.style.animationPlayState = "paused"
                btn.innerHTML = "Play"

            }

        }

    </script>

</body>

</html>
