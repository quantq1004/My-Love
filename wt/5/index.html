<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>💞 My bae - Quỳnh Trang 💞</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="imgs/love-yourself.png">
    <link rel="stylesheet" href="./main.css">

    <style>
        .disk {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: url("imgs/love2.png") center/cover no-repeat;
            margin: 10px auto;
            position: relative;
            animation: spin 5s linear infinite;
            animation-play-state: paused;
        }

        .disk::after {
            content: "";
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        /* 🎵 music box */
        .music-box {
            position: fixed;
            bottom: 100px;
            right: 20px;

            background: rgba(186, 230, 253, 0.6);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 20px rgba(125, 211, 252, 0.4);

            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 16px;

            display: flex;             
            flex-direction: column;     
            align-items: center;
            gap: 12px;                 

            text-align: center;
            z-index: 5;
            cursor: pointer;
        }

        .music-box:hover {
            background: rgba(125, 211, 252, 0.85);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.6); 
            transform: scale(1.05);
            transition: 0.3s;
        }

        .song-title {
            color: #38bdf8;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .love-text {
            font-weight: 500;
            max-width: 600px;
            margin: 20px auto;
            font-size: 24px;
            line-height: 1.7;
            padding: 0 20px;

            color: #e0f2ff;

            text-shadow:
                0 0 8px rgba(255,255,255,0.6),
                0 0 16px rgba(100,180,255,0.6),
                0 0 24px rgba(100,180,255,0.4);
        }

        /* play button */
        #playBtn {
            background: none;
            border: none;
            cursor: pointer;
        }

        #playBtn img {
            width: 30px;
        }
    </style>
</head>

<body>

    <div id="app"></div>

    <!-- 🎵 MUSIC BOX -->
    <div class="music-box">
        <div id="disk" class="disk"></div>
        <div class="song-title">🍁 Until You 🍁</div>
        <button id="playBtn">
            <img id="playIcon" src="play.png" alt="play">
        </button>
    </div>

    <!-- 🎵 AUDIO -->
    <audio id="music" loop>
        <source src="UntilYou.mp3" type="audio/mp3">
    </audio>

    <!-- JS -->
    <script src="./main.js"></script>
    <script src="./music.js"></script>

</body>

</html>
