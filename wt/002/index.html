

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gửi em iuu 💞</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="lockScreen">
    <div class="lock-box">
        <h2>🔐 Mời em iu nhập mật khẩu 💖</h2>
        <input type="password" id="password">
        <button id="unlockBtn">Mở khóa ❤️</button>
        <p id="error"></p>
    </div>
</div>

<div id="main" class="hidden">

    <h1 class="title">💖 Dành cho em 💖</h1>

    <div class="content">
        <div id="text-box">
            <div id="code"></div>
        </div>

        <canvas id="canvas"></canvas>
    </div>

</div>

<!-- MUSIC -->
<div class="music">

    <div id="disk" class="disk"></div>

    <div>Perfect 🎵</div>

    <button id="playBtn" class="play">
        ▶️
    </button>

</div>

<audio id="bgm" loop>
    <source src="otrongkhurung.mp3">
</audio>

<script src="main.js"></script>
</body>
</html>
