<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>💖 Quỳnh Trang 💖</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial, Helvetica, sans-serif;
text-align:center;
color:white;
overflow:hidden;
}

/* TITLE */

.title{
margin-top:60px;
font-size:42px;
font-weight:bold;
}

.subtitle{
font-size:20px;
opacity:0.9;
}

/* HEART */

#heart{
position:relative;
width:200px;
height:200px;
margin:100px auto;
transform:rotate(45deg);
background:#ff2e63;
animation:beat 1s infinite;
cursor:pointer;
box-shadow:0 0 40px #ff2e63;
}

#heart:before,
#heart:after{
content:'';
position:absolute;
width:200px;
height:200px;
background:#ff2e63;
border-radius:50%;
}

#heart:before{
top:-100px;
left:0;
}

#heart:after{
left:-100px;
top:0;
}

@keyframes beat{
0%{transform:scale(1) rotate(45deg)}
50%{transform:scale(1.1) rotate(45deg)}
100%{transform:scale(1) rotate(45deg)}
}

/* MESSAGE */

#message{
display:none;
font-size:28px;
margin-top:20px;
}

/* TIMER */

#timer{
margin-top:20px;
font-size:22px;
}

/* BUTTON GO */

.go-btn{
margin-top:30px;
display:inline-block;
padding:12px 30px;
background:white;
color:#ff2e63;
font-weight:bold;
border-radius:30px;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.go-btn:hover{
transform:scale(1.1);
}

/* FLOWERS */

.flower{
position:absolute;
top:-10px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

/* MUSIC PLAYER */

.music-player{

position:fixed;
right:20px;
bottom:20px;

display:flex;
align-items:center;
gap:10px;

background:rgba(255,255,255,0.2);
padding:10px 15px;
border-radius:30px;
backdrop-filter:blur(10px);

}

/* DISK */

.disk{

width:50px;
height:50px;
border-radius:50%;
background:url("preview/music.png");
background-size:cover;

animation:spin 4s linear infinite;
animation-play-state:paused;

}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

/* SONG NAME */

.song-name{
font-size:14px;
}

/* PLAY BUTTON */

.play-btn{

background:white;
border:none;
border-radius:20px;
padding:6px 12px;
cursor:pointer;

}

</style>

</head>

<body>

<div class="title">
💕 Quỳnh Trang 💕
</div>

<div class="subtitle">
Every time I see you, my heart beats faster
</div>

<div id="heart"></div>

<div id="message">
Anh yêu em rất nhiều 💖
</div>

<div id="timer"></div>

<a class="go-btn" href="001/">
💌 Xem điều anh chuẩn bị cho em
</a>

<!-- MUSIC PLAYER -->

<div class="music-player">

<div class="disk" id="disk"></div>

<div class="song-name">
Tình cờ tôi thích em 🎵
</div>

<button class="play-btn" onclick="toggleMusic()">
Play
</button>

</div>

<audio id="bgm" loop>
<source src="audio/tinhcotoithichem.mp3">
</audio>

<script>

/* HEART CLICK */

document.getElementById("heart").onclick=function(){

document.getElementById("message").style.display="block"

}

/* TIMER */

var start=new Date("2026-03-12")

function update(){

var now=new Date()

var diff=now-start

var days=Math.floor(diff/1000/60/60/24)

var hours=Math.floor(diff/1000/60/60)%24

var minutes=Math.floor(diff/1000/60)%60

var seconds=Math.floor(diff/1000)%60

document.getElementById("timer").innerHTML=

"Đã bên nhau: "

+days+" ngày "

+hours+" giờ "

+minutes+" phút "

+seconds+" giây"

}

setInterval(update,1000)

/* FLOWERS */

function flower(){

var f=document.createElement("div")

f.className="flower"

f.innerHTML="🌸"

f.style.left=Math.random()*100+"vw"

f.style.animationDuration=(3+Math.random()*5)+"s"

document.body.appendChild(f)

setTimeout(()=>f.remove(),8000)

}


function flower1(){

var f=document.createElement("div")

f.className="flower"

f.innerHTML="😍"

f.style.left=Math.random()*100+"vw"

f.style.animationDuration=(3+Math.random()*5)+"s"

document.body.appendChild(f)

setTimeout(()=>f.remove(),8000)

}


function heart(){

var f=document.createElement("div")

f.className="flower"

f.innerHTML="💕"

f.style.left=Math.random()*100+"vw"

f.style.animationDuration=(3+Math.random()*5)+"s"

document.body.appendChild(f)

setTimeout(()=>f.remove(),8000)

}

function heart1(){

var f=document.createElement("div")

f.className="flower"

f.innerHTML="💖"

f.style.left=Math.random()*100+"vw"

f.style.animationDuration=(3+Math.random()*5)+"s"

document.body.appendChild(f)

setTimeout(()=>f.remove(),8000)

}


setInterval(flower,300)


setInterval(flower1,200)

setInterval(heart,300)


setInterval(heart1,200)

/* MUSIC */

const music=document.getElementById("bgm")
const disk=document.getElementById("disk")

function toggleMusic(){

if(music.paused){

music.play()
disk.style.animationPlayState="running"

}else{

music.pause()
disk.style.animationPlayState="paused"

}

}

</script>

</body>

</html>
