<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>💖 Quỳnh Trang 💖</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
color:white;
overflow-x:hidden;
background:
radial-gradient(circle at 20% 30%,#1a2a6c,#000 60%),
radial-gradient(circle at 80% 70%,#16222A,#000 70%);
}

/* ===== STARS ===== */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

/* ===== SHOOTING STAR ===== */

.shooting{
position:fixed;
width:2px;
height:2px;
background:white;
box-shadow:0 0 10px white;
animation:shoot 2s linear forwards;
}

@keyframes shoot{

0%{
transform:translateX(-10vw) translateY(0);
opacity:1;
}

100%{
transform:translateX(110vw) translateY(200px);
opacity:0;
}

}

/* ===== TITLE ===== */

.title{
margin-top:70px;
font-size:46px;
font-weight:bold;
}

.cinematic{

background:linear-gradient(90deg,#fff,#ff9a9e,#fff);
background-size:200%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:shine 6s linear infinite;

}

@keyframes shine{
0%{background-position:-200%}
100%{background-position:200%}
}

.subtitle{
font-size:20px;
opacity:0.9;
}

/* ===== HEART ===== */

#heart{

position:relative;
width:200px;
height:200px;

margin:80px auto;

transform:rotate(45deg);

background:#ff2e63;

animation:beat 1.2s infinite;

cursor:pointer;

box-shadow:0 0 60px #ff2e63;

}

#heart:before,
#heart:after{

content:'';
position:absolute;

width:200px;
height:200px;

background:#ff2e63;

border-radius:50%;

}

#heart:before{
top:-100px;
}

#heart:after{
left:-100px;
}

@keyframes beat{

0%{transform:scale(1) rotate(45deg)}
50%{transform:scale(1.12) rotate(45deg)}
100%{transform:scale(1) rotate(45deg)}

}

/* ===== HEART EXPLOSION ===== */

.explode-heart{
position:fixed;
font-size:22px;
pointer-events:none;
animation:explode 1.2s ease-out forwards;
}

@keyframes explode{

0%{
opacity:1;
transform:translate(0,0) scale(0.5);
}

100%{
opacity:0;
transform:translate(var(--x),var(--y)) scale(1.8);
}

}

/* ===== TIMER ===== */

#timer{
margin-top:20px;
font-size:22px;
background:rgba(255,255,255,0.2);
display:inline-block;
padding:12px 22px;
border-radius:20px;
backdrop-filter:blur(10px);
}

/* ===== MESSAGE ===== */

#message{
display:none;
font-size:28px;
margin-top:20px;
}

/* ===== FLOWER RAIN ===== */

.fall{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}

/* ===== HEART FOLLOW MOUSE ===== */

.mouse-heart{
position:fixed;
font-size:18px;
pointer-events:none;
animation:float 1s linear forwards;
}

@keyframes float{
0%{opacity:1; transform:translateY(0)}
100%{opacity:0; transform:translateY(-40px)}
}

/* ===== SPARKLE ===== */

.spark{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:spark 1s infinite;
}

@keyframes spark{

0%{opacity:1; transform:scale(0.6)}
50%{opacity:1; transform:scale(1.2)}
100%{opacity:0; transform:scale(0.4)}

}

/* ===== MUSIC PLAYER ===== */

.music-player{

position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);

display:flex;
align-items:center;
gap:15px;

background:rgba(0,0,0,0.6);

padding:12px 20px;

border-radius:50px;

backdrop-filter:blur(15px);

box-shadow:0 10px 40px rgba(0,0,0,0.6);

}

.disk{

width:50px;
height:50px;

border-radius:50%;

background:url("preview/music.png");
background-size:cover;

border:3px solid rgba(255,255,255,0.7);

animation:spin 4s linear infinite;
animation-play-state:paused;

}

@keyframes spin{
to{transform:rotate(360deg)}
}

.song-title{
font-size:14px;
}

.play{

background:#1db954;

border:none;

color:white;

width:40px;
height:40px;

border-radius:50%;

cursor:pointer;

font-size:16px;

}

/* ===== CREDIT ===== */

.credit{
position:fixed;
bottom:5px;
right:10px;
font-size:12px;
opacity:0.6;
}

</style>

</head>

<body>

<div class="title cinematic">💕 Quỳnh Trang 💕</div>

<div class="subtitle">
Every time I see you, my heart beats faster
</div>

<div id="heart"></div>

<div id="message">
Anh yêu em rất nhiều 💖
</div>

<div id="timer"></div>

<!-- MUSIC PLAYER -->

<div class="music-player">

<div class="disk" id="disk"></div>

<div class="song-title">
Tình cờ tôi thích em 🎵
</div>

<button class="play" id="btn" onclick="toggleMusic()">▶</button>

</div>

<audio id="bgm" loop autoplay muted>
<source src="audio/tinhcotoithichem.mp3">
</audio>

<div class="credit">
Created with ❤️ by <b>quantq</b>
</div>

<script>

/* ===== GALAXY STARS ===== */

for(let i=0;i<120;i++){

const star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"

star.style.animationDuration=(2+Math.random()*3)+"s"

document.body.appendChild(star)

}

/* ===== SHOOTING STAR ===== */

setInterval(()=>{

const s=document.createElement("div")

s.className="shooting"

s.style.top=Math.random()*50+"vh"

document.body.appendChild(s)

setTimeout(()=>s.remove(),2000)

},6000)

/* ===== HEART CLICK ===== */

document.getElementById("heart").onclick=(e)=>{

document.getElementById("message").style.display="block"

for(let i=0;i<35;i++){

setTimeout(()=>{

const h=document.createElement("div")

h.className="explode-heart"

h.innerHTML=["💖","💗","💕","💘"][Math.floor(Math.random()*4)]

h.style.left=e.clientX+"px"
h.style.top=e.clientY+"px"

h.style.setProperty("--x",(Math.random()*200-100)+"px")
h.style.setProperty("--y",(Math.random()*200-100)+"px")

document.body.appendChild(h)

setTimeout(()=>h.remove(),1200)

},i*20)

}

}

/* ===== TIMER ===== */

var start=new Date("2026-03-12")

function update(){

var now=new Date()

var diff=now-start

var d=Math.floor(diff/86400000)
var h=Math.floor(diff/3600000)%24
var m=Math.floor(diff/60000)%60
var s=Math.floor(diff/1000)%60

document.getElementById("timer").innerHTML=
"Quang Quân ❤️ Quỳnh Trang<br>Đã bên nhau: "+
d+" ngày "+h+" giờ "+m+" phút "+s+" giây"

}

setInterval(update,1000)
update()

/* ===== FLOWER RAIN ===== */

function rain(){

var e=document.createElement("div")

e.className="fall"

var icons=["🌸","🍀","💖","💗"]

e.innerHTML=icons[Math.floor(Math.random()*icons.length)]

e.style.left=Math.random()*100+"vw"

e.style.animationDuration=(3+Math.random()*5)+"s"

document.body.appendChild(e)

setTimeout(()=>e.remove(),8000)

}

setInterval(rain,450)

/* ===== HEART FOLLOW MOUSE ===== */

let last=0

document.onmousemove=(e)=>{

const now=Date.now()

if(now-last<40) return

last=now

var h=document.createElement("div")

h.className="mouse-heart"

h.innerHTML="💗"

h.style.left=e.pageX+"px"
h.style.top=e.pageY+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),1000)

}

/* ===== SPARKLE ===== */

for(let i=0;i<15;i++){

var s=document.createElement("div")

s.className="spark"

s.style.left=Math.random()*200+"px"
s.style.top=Math.random()*200+"px"

document.getElementById("heart").appendChild(s)

}

/* ===== MUSIC ===== */

const music=document.getElementById("bgm")
const disk=document.getElementById("disk")
const btn=document.getElementById("btn")

function toggleMusic(){

if(music.paused){

music.play()

disk.style.animationPlayState="running"

btn.innerHTML="⏸"

}else{

music.pause()

disk.style.animationPlayState="paused"

btn.innerHTML="▶"

}

}

/* ===== AUTO PLAY ===== */

window.onload=()=>{

music.muted=true

music.play().then(()=>{

disk.style.animationPlayState="running"
btn.innerHTML="⏸"

setTimeout(()=>music.muted=false,800)

}).catch(()=>{})

}

</script>

</body>
</html>
