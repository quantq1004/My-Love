```html
<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>💖 Quỳnh Trang 💖</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
color:white;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
overflow:hidden;
}

/* ===== TITLE ===== */

.title{
margin-top:60px;
font-size:42px;
font-weight:bold;
}

.subtitle{
font-size:20px;
opacity:0.9;
}

/* ===== HEART ===== */

#heart{

position:relative;
width:200px;
height:200px;
margin:90px auto;

transform:rotate(45deg);

background:#ff2e63;

animation:beat 1s infinite;

cursor:pointer;

box-shadow:0 0 50px #ff2e63;

}

#heart:before,
#heart:after{

content:'';
position:absolute;

width:200px;
height:200px;

background:#ff2e63;

border-radius:50%;

}

#heart:before{
top:-100px;
left:0;
}

#heart:after{
left:-100px;
top:0;
}

@keyframes beat{

0%{transform:scale(1) rotate(45deg)}
50%{transform:scale(1.12) rotate(45deg)}
100%{transform:scale(1) rotate(45deg)}

}

/* ===== MESSAGE ===== */

#message{
display:none;
font-size:28px;
margin-top:20px;
}

/* ===== TIMER ===== */

#timer{

margin-top:20px;
font-size:22px;

background:rgba(255,255,255,0.2);

display:inline-block;

padding:12px 22px;

border-radius:20px;

backdrop-filter:blur(10px);

}

/* ===== FLOWER RAIN ===== */

.fall{

position:fixed;
top:-10px;

font-size:20px;

animation:fall linear forwards;

}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

/* ===== HEART FOLLOW MOUSE ===== */

.mouse-heart{

position:fixed;

font-size:18px;

pointer-events:none;

animation:float 1s linear forwards;

}

@keyframes float{

0%{opacity:1; transform:translateY(0)}
100%{opacity:0; transform:translateY(-40px)}

}

/* ===== SPARKLE ===== */

.spark{

position:absolute;

width:6px;
height:6px;

background:white;

border-radius:50%;

animation:spark 1s linear infinite;

}

@keyframes spark{

0%{opacity:1}
100%{opacity:0}

}

/* ===== MUSIC PLAYER ===== */

.music-player{

position:fixed;

right:20px;
bottom:20px;

display:flex;
align-items:center;
gap:10px;

background:rgba(255,255,255,0.25);

padding:10px 15px;

border-radius:30px;

backdrop-filter:blur(10px);

box-shadow:0 10px 30px rgba(0,0,0,0.3);

}

/* DISK */

.disk{

width:50px;
height:50px;

border-radius:50%;

background:url("preview/music.png");

background-size:cover;

border:3px solid rgba(255,255,255,0.7);

animation:spin 4s linear infinite;

animation-play-state:paused;

}

@keyframes spin{

from{transform:rotate(0)}
to{transform:rotate(360deg)}

}

/* PLAY BUTTON */

.play{

background:#ff4d6d;

border:none;

color:white;

padding:6px 12px;

border-radius:20px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="title">
💕 Quỳnh Trang 💕
</div>

<div class="subtitle">
Every time I see you, my heart beats faster
</div>

<div id="heart"></div>

<div id="message">
Anh yêu em rất nhiều 💖
</div>

<div id="timer"></div>

<!-- MUSIC PLAYER -->

<div class="music-player">

<div class="disk" id="disk"></div>

<div>Tình cờ tôi thích em 🎵</div>

<button class="play" id="btn" onclick="toggleMusic()">Play</button>

</div>

<audio id="bgm" loop autoplay>
<source src="audio/tinhcotoithichem.mp3">
</audio>

<script>

/* ===== HEART CLICK ===== */

document.getElementById("heart").onclick=()=>{

document.getElementById("message").style.display="block"

}

/* ===== TIMER ===== */

var start=new Date("2026-03-12T00:00:00")

function update(){

var now=new Date()

var diff=now-start

var d=Math.floor(diff/1000/60/60/24)

var h=Math.floor(diff/1000/60/60)%24

var m=Math.floor(diff/1000/60)%60

var s=Math.floor(diff/1000)%60

document.getElementById("timer").innerHTML=

"Quang Quân ❤️ Quỳnh Trang<br>Đã bên nhau: "

+d+" ngày "+h+" giờ "+m+" phút "+s+" giây"

}

update()
setInterval(update,1000)

/* ===== FLOWER RAIN ===== */

function rain(){

var e=document.createElement("div")

e.className="fall"

var icons=["🌸","💕","💖","😍"]

e.innerHTML=icons[Math.floor(Math.random()*icons.length)]

e.style.left=Math.random()*100+"vw"

e.style.animationDuration=(3+Math.random()*5)+"s"

document.body.appendChild(e)

setTimeout(()=>e.remove(),8000)

}

setInterval(rain,250)

/* ===== HEART FOLLOW MOUSE ===== */

document.onmousemove=(e)=>{

var h=document.createElement("div")

h.className="mouse-heart"

h.innerHTML="💗"

h.style.left=e.pageX+"px"

h.style.top=e.pageY+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),1000)

}

/* ===== SPARKLE AROUND HEART ===== */

for(let i=0;i<15;i++){

var s=document.createElement("div")

s.className="spark"

s.style.left=Math.random()*200+"px"

s.style.top=Math.random()*200+"px"

document.getElementById("heart").appendChild(s)

}

/* ===== MUSIC ===== */

const music=document.getElementById("bgm")
const disk=document.getElementById("disk")
const btn=document.getElementById("btn")

function toggleMusic(){

if(music.paused){

music.play().then(()=>{

disk.style.animationPlayState="running"

btn.innerHTML="Pause"

})

}else{

music.pause()

disk.style.animationPlayState="paused"

btn.innerHTML="Play"

}

}

/* AUTO PLAY */

window.onload=()=>{

music.play().then(()=>{

disk.style.animationPlayState="running"

btn.innerHTML="Pause"

}).catch(()=>{})

}

</script>

</body>

</html>
```
