<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>💖 Quỳnh Trang 💖</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
color:white;
overflow-x:hidden;
background:
radial-gradient(circle at 20% 30%,#1a2a6c,#000 60%),
radial-gradient(circle at 80% 70%,#16222A,#000 70%);
}

/* ===== STARS ===== */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

/* ===== SHOOTING STAR ===== */

.shooting{
position:fixed;
width:2px;
height:2px;
background:white;
box-shadow:0 0 10px white;
animation:shoot 2s linear forwards;
}

@keyframes shoot{

0%{
transform:translateX(-10vw) translateY(0);
opacity:1;
}

100%{
transform:translateX(110vw) translateY(200px);
opacity:0;
}

}

/* ===== TITLE ===== */

.title{
margin-top:70px;
font-size:42px;
font-weight:bold;
}

.subtitle{
font-size:20px;
opacity:0.9;
}

/* ===== HEART IMAGE ===== */

#heart{

width:220px;
margin:70px auto;

cursor:pointer;

animation:beat 1.4s infinite;

filter:drop-shadow(0 0 25px #ff2e63);

}

#heart img{
width:100%;
height:auto;
display:block;
}

@keyframes beat{

0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}

}

/* ===== HEART EXPLOSION ===== */

.explode-heart{
position:fixed;
font-size:22px;
pointer-events:none;
animation:explode 1.2s ease-out forwards;
}

@keyframes explode{

0%{
opacity:1;
transform:translate(0,0) scale(0.5);
}

100%{
opacity:0;
transform:translate(var(--x),var(--y)) scale(1.8);
}

}

/* ===== TIMER ===== */

#timer{
margin-top:20px;
font-size:20px;
background:rgba(255,255,255,0.2);
display:inline-block;
padding:10px 20px;
border-radius:20px;
backdrop-filter:blur(10px);
}

/* ===== MESSAGE ===== */

#message{
display:none;
font-size:26px;
margin-top:20px;
}

/* ===== FLOWERS ===== */

.fall{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}

/* ===== HEART FOLLOW ===== */

.mouse-heart{
position:fixed;
font-size:18px;
pointer-events:none;
animation:float 1s linear forwards;
}

@keyframes float{
0%{opacity:1; transform:translateY(0)}
100%{opacity:0; transform:translateY(-40px)}
}

/* ===== SPARKLE ===== */

.spark{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:spark 1s infinite;
}

@keyframes spark{

0%{opacity:1; transform:scale(0.6)}
50%{opacity:1; transform:scale(1.2)}
100%{opacity:0; transform:scale(0.4)}

}

/* ===== MUSIC PLAYER ===== */

.music-player{

position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);

display:flex;
align-items:center;
gap:10px;

background:rgba(0,0,0,0.6);

padding:8px 14px;

border-radius:40px;

backdrop-filter:blur(10px);

font-size:14px;

max-width:90vw;

}

.disk{

width:36px;
height:36px;

border-radius:50%;

background:url("preview/music.png");
background-size:cover;

border:2px solid rgba(255,255,255,0.7);

animation:spin 4s linear infinite;
animation-play-state:paused;

}

@keyframes spin{
to{transform:rotate(360deg)}
}

.play{

background:#1db954;

border:none;

color:white;

width:32px;
height:32px;

border-radius:50%;

cursor:pointer;

font-size:14px;

}

/* ===== MOBILE ===== */

@media (max-width:600px){

.title{font-size:30px}

.subtitle{font-size:16px}

#heart{width:170px}

#timer{font-size:16px}

}

</style>

</head>

<body>

<div class="title">💕 Quỳnh Trang 💕</div>

<div class="subtitle">
Every time I see you, my heart beats faster
</div>

<div id="heart">
<img src="preview/001.png">
</div>

<div id="message">
Anh yêu em rất nhiều 💖
</div>

<div id="timer"></div>

<!-- MUSIC PLAYER -->

<div class="music-player">

<div class="disk" id="disk"></div>

<div>Tình cờ tôi thích em 🎵</div>

<button class="play" id="btn" onclick="toggleMusic()">▶</button>

</div>

<audio id="bgm" loop>
<source src="audio/tinhcotoithichem.mp3" type="audio/mpeg">
</audio>

<script>

/* ===== STARS ===== */

for(let i=0;i<120;i++){

const star=document.createElement("div")
star.className="star"

star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"

document.body.appendChild(star)

}

/* ===== SHOOTING STAR ===== */

setInterval(()=>{

const s=document.createElement("div")

s.className="shooting"
s.style.top=Math.random()*50+"vh"

document.body.appendChild(s)

setTimeout(()=>s.remove(),2000)

},6000)

/* ===== HEART CLICK ===== */

document.getElementById("heart").onclick=(e)=>{

document.getElementById("message").style.display="block"

for(let i=0;i<30;i++){

setTimeout(()=>{

const h=document.createElement("div")

h.className="explode-heart"

h.innerHTML=["💖","💗","💕","💘"][Math.floor(Math.random()*4)]

h.style.left=e.clientX+"px"
h.style.top=e.clientY+"px"

h.style.setProperty("--x",(Math.random()*200-100)+"px")
h.style.setProperty("--y",(Math.random()*200-100)+"px")

document.body.appendChild(h)

setTimeout(()=>h.remove(),1200)

},i*20)

}

}

/* ===== TIMER ===== */

var start=new Date("2026-03-12")

function update(){

var now=new Date()

var diff=now-start

var d=Math.floor(diff/86400000)
var h=Math.floor(diff/3600000)%24
var m=Math.floor(diff/60000)%60
var s=Math.floor(diff/1000)%60

document.getElementById("timer").innerHTML=
"Kỷ niệm từ: 12-03-2026<br>"+
d+" ngày "+h+" giờ "+m+" phút "+s+" giây"

}

setInterval(update,1000)
update()

/* ===== FLOWER RAIN ===== */

function rain(){

var e=document.createElement("div")

e.className="fall"

var icons=["🌸","🍀","💖","💗"]

e.innerHTML=icons[Math.floor(Math.random()*icons.length)]

e.style.left=Math.random()*100+"vw"

e.style.animationDuration=(3+Math.random()*5)+"s"

document.body.appendChild(e)

setTimeout(()=>e.remove(),8000)

}

setInterval(rain,450)

/* ===== HEART FOLLOW MOUSE ===== */

let last=0

document.onmousemove=(e)=>{

const now=Date.now()

if(now-last<40) return

last=now

var h=document.createElement("div")

h.className="mouse-heart"

h.innerHTML="💗"

h.style.left=e.pageX+"px"
h.style.top=e.pageY+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),1000)

}

/* ===== SPARKLE ===== */

for(let i=0;i<15;i++){

var s=document.createElement("div")

s.className="spark"

s.style.left=Math.random()*200+"px"
s.style.top=Math.random()*200+"px"

document.getElementById("heart").appendChild(s)

}

/* ===== MUSIC ===== */

const music=document.getElementById("bgm")
const disk=document.getElementById("disk")
const btn=document.getElementById("btn")

function toggleMusic(){

if(music.paused){

music.play()
disk.style.animationPlayState="running"
btn.innerHTML="Pause"

}else{

music.pause()
disk.style.animationPlayState="paused"
btn.innerHTML="Play"

}

}

</script>

</body>
</html>
