<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Story</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #ff758f;
            --bg-color: #fff5f7;
        }

        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: #444;
            overflow-x: hidden;
        }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(255, 238, 242, 0.5), rgba(255, 238, 242, 0.5)), 
                        url('https://images.unsplash.com/photo-1518199266791-739d6ff26ef0?q=80&w=2070') center/cover;
        }

        header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            color: var(--primary-color);
            margin: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        .days-number {
            font-size: 4rem;
            font-weight: bold;
            color: var(--primary-color);
            display: block;
        }

        .status-section {
            padding: 60px 20px;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-container {
            max-width: 600px;
            width: 100%;
            text-align: left;
        }

        .status-item {
            margin-bottom: 25px;
        }

        .status-item p {
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff758f, #ffafbd);
            border-radius: 10px;
            animation: grow 2s ease-out;
        }

        .status-text {
            font-style: italic;
            color: var(--primary-color);
            font-size: 1.1rem;
            border-left: 3px solid var(--primary-color);
            padding-left: 15px;
            margin-top: 10px;
        }

        @keyframes grow {
            from { width: 0; }
        }

        .gallery-section {
            padding: 80px 0;
            max-width: 1000px;
            margin: auto;
        }

        .gallery-title {
            text-align: center;
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            margin-bottom: 30px;
            color: var(--primary-color);
        }

        .swiper {
            width: 80%;
            padding-top: 50px;
            padding-bottom: 50px;
        }

        .swiper-slide {
            background-position: center;
            background-size: cover;
            width: 300px;
            height: 400px;
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
            filter: blur(1px);
        }

        .swiper-slide-active {
            filter: blur(0);
        }

        .swiper-slide img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }

        .heart-drop {
            position: fixed;
            top: -10%;
            color: var(--primary-color);
            user-select: none;
            pointer-events: none;
            z-index: 9999;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        footer {
            padding: 40px;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>Love You Forever</h1>
        <p>Thế giới của anh đẹp hơn từ khi có em</p>
    </header>

    <section class="status-section">
    <h2 class="gallery-title">Tình Trạng Mối Quan Hệ</h2>
    <div class="status-container">
        <div class="status-item">
            <p>Mức độ hạnh phúc</p>
            <div class="progress-bar"><div class="progress-fill" style="width: 100%;"></div></div>
            <span>1000% (Vượt mức cho phép)</span>
        </div>
        <div class="status-item">
            <p>Sự thấu hiểu</p>
            <div class="progress-bar"><div class="progress-fill" style="width: 95%;"></div></div>
            <span>95% (Vẫn đang tăng mỗi ngày)</span>
        </div>
        <div class="status-item">
            <p>Dự báo tương lai</p>
            <div class="status-text">"Bão táp ngoài kia không bằng bình yên bên em"</div>
        </div>
    </div>
</section>

    <section class="gallery-section">
        <h2 class="gallery-title">Khoảnh Khắc Kỷ Niệm</h2>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="https://via.placeholder.com/300x400?text=Anh+1" /></div>
                <div class="swiper-slide"><img src="https://via.placeholder.com/300x400?text=Anh+2" /></div>
                <div class="swiper-slide"><img src="https://via.placeholder.com/300x400?text=Anh+3" /></div>
                <div class="swiper-slide"><img src="https://via.placeholder.com/300x400?text=Anh+4" /></div>
                <div class="swiper-slide"><img src="https://via.placeholder.com/300x400?text=Anh+5" /></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <footer>
        <p>Created with ❤️ by QT</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", {
            effect: "coverflow",
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: "auto",
            coverflowEffect: {
                rotate: 50,
                stretch: 0,
                depth: 100,
                modifier: 1,
                slideShadows: true,
            },
            pagination: {
                el: ".swiper-pagination",
            },
            loop: true,
            autoplay: {
                delay: 2500,
                disableOnInteraction: false,
            },
        });

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-drop');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 2 + "s";
            heart.style.fontSize = Math.random() * 20 + 10 + "px";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 400);
    </script>
</body>
</html>
