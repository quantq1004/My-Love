<!DOCTYPE html>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f5f5;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.heart-main{

width:200px;

animation:heartbeat 1.2s infinite;

filter:drop-shadow(0 0 10px #ff4d6d);

transition:0.3s;

}

.heart-main:hover{

transform:scale(1.15);

filter:drop-shadow(0 0 25px #ff4d6d);

}

@keyframes heartbeat{

0%{transform:scale(1)}

25%{transform:scale(1.1)}

40%{transform:scale(1)}

60%{transform:scale(1.1)}

100%{transform:scale(1)}

}

/* HERO */

.hero{
    background:linear-gradient(135deg,#1d976c,#93f9b9);
    color:white;
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:48px;
    margin-bottom:10px;
}

.hero p{
    font-size:20px;
    opacity:0.9;
}

.github-btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 24px;
    border:1px solid white;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

.github-btn:hover{
    background:white;
    color:#1d976c;
}

/* CONTENT */

.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
    text-align:center;
}

.heart{
    font-size:80px;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-top:30px;
}

.card{
    background:white;
    border-radius:8px;
    padding:20px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    border-radius:6px;
}

.card a{
    text-decoration:none;
    color:#0077ff;
    font-weight:bold;
}

.section-title{
    font-size:28px;
    color:#1d976c;
    margin-top:40px;
}

</style>
