<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <title>💝 My Love Code for WT 💝</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        /* ===== GLOBAL ===== */

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;

            /* romantic background */

            background:
                radial-gradient(circle at 20% 30%, #ff9a9e 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #fad0c4 0%, transparent 40%),
                linear-gradient(135deg, #ff758c, #ff7eb3, #ff4d6d);

            background-attachment: fixed;
        }

        /* HERO */

        .hero {
            padding: 100px 80px 20px;
        }

        .hero h1 {
            font-size: 32px;
        }

        .hero p {
            font-size: 20px;
            opacity: 0.9;
        }

        /* CONTAINER */

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px 20px;
        }

        /* HEART */

        .heart-main {
            width: 200px;
            animation: heartbeat 1.4s infinite;
            filter: drop-shadow(0 0 30px #ff4d6d);
        }

        @keyframes heartbeat {

            0% {
                transform: scale(1)
            }

            25% {
                transform: scale(1.1)
            }

            40% {
                transform: scale(1)
            }

            60% {
                transform: scale(1.1)
            }

            100% {
                transform: scale(1)
            }

        }

        /* TIMER */

        .timer {
            margin-top: 20px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.2);
            display: inline-block;
            padding: 12px 25px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        /* GRID */

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        /* CARD */

        .card {
            background: white;
            color: black;
            border-radius: 14px;
            padding: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        /* FLOAT HEART */

        .heart {
            position: fixed;
            bottom: -20px;
            font-size: 20px;
            animation: floatUp linear forwards;
        }

        @keyframes floatUp {

            0% {
                transform: translateY(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh);
                opacity: 0;
            }

        }

        /* FLOWER */

        .flower {
            position: fixed;
            top: -10px;
            font-size: 20px;
            animation: fall linear forwards;
        }

        @keyframes fall {

            to {
                transform: translateY(110vh) rotate(360deg);
            }

        }

        /* SPARKLE */

        .spark {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkle 3s infinite;
        }

        @keyframes sparkle {

            0% {
                opacity: 0.3;
                transform: scale(0.6)
            }

            50% {
                opacity: 1;
                transform: scale(1.2)
            }

            100% {
                opacity: 0.3;
                transform: scale(0.6)
            }

        }

        /* MUSIC */

        .music {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 30px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .disk {

            width: 45px;
            height: 45px;

            border-radius: 50%;

            background: url("preview/disks.png");
            background-size: cover;

            animation: spin 5s linear infinite;
            animation-play-state: paused;

        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .play {
            background: #ff4d6d;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        /* CREDIT */

        .credit {
            margin-top: 60px;
            opacity: 0.7;
            font-size: 14px;
        }
    </style>

</head>

<body>

    <div class="hero">

        <h1>Dành cho em iu xinh đẹp của anh ❤️</h1>
        <p>✨ Romantic coding ✨</p>

    </div>

    <div class="container">

        <img class="heart-main" src="preview/heart-main.png">

        <h2>✨ My Love - Quỳnh Trang ✨</h2>

        <div id="timer" class="timer"></div>

        <p>🌸 Những điều nhỏ anh viết cho em 🌸</p>

        <div class="grid">

            <div class="card">

                <a href="wt/1/" target="_blank">

                    <img src="preview/001.png">

                    <h3>💌 1 Love 💌</h3>

                </a>

            </div>

            <div class="card">

                <a href="wt/2/" target="_blank">

                    <img src="preview/002.png">

                    <h3>💝 2 Love 💝</h3>

                </a>

            </div>

            <div class="card">

                <a href="wt/3/" target="_blank">

                    <img src="preview/003.png">

                    <h3>🌺 3 Love 🌺</h3>

                </a>

            </div>

            <div class="card">

                <a href="wt/4/" target="_blank">

                    <img src="preview/004.png">

                    <h3>😽 4 Love 😽</h3>

                </a>

            </div>

            <div class="card">

                <a href="wt/5/" target="_blank">

                    <img src="preview/005.png">

                    <h3>😊 5 Love 😊</h3>

                </a>

            </div>

            <div class="card">

                <a href="wt/6/" target="_blank">

                    <img src="preview/006.png">

                    <h3>💞 6 Love 💞</h3>

                </a>

            </div>

            <div class="card">

                <h3>🌸 Coming soon 🌸</h3>

            </div>
            <div class="card">

                <h3>🌸 Coming soon 🌸</h3>

            </div>
            <div class="card">

                <h3>🌸 Coming soon 🌸</h3>

            </div>

        </div>

        <div class="credit">
            Created with ❤️ by <b>Anh iuu của em - QT</b>
        </div>

    </div>

    <!-- MUSIC -->

    <div class="music">

        <div id="disk" class="disk"></div>

        <div>Perfect 🎵</div>

        <button id="playBtn" class="play" onclick="toggleMusic()">
            Play
        </button>

    </div>

    <audio id="bgm" loop>
        <source src="audio/Perfect.mp3">
    </audio>

    <script>

        /* TIMER */

        var start = new Date("2026-03-12T00:00:00")

        function update() {

            var now = new Date()

            var diff = now - start

            var d = Math.floor(diff / 1000 / 60 / 60 / 24)
            var h = Math.floor(diff / 1000 / 60 / 60) % 24
            var m = Math.floor(diff / 1000 / 60) % 60
            var s = Math.floor(diff / 1000) % 60

            document.getElementById("timer").innerHTML =

                "Quang Quân ❤️ Quỳnh Trang<br>" +

                "Đã bên nhau: " +

                d + " ngày " + h + " giờ " + m + " phút " + s + " giây"

        }

        setInterval(update, 1000)
        update()

        /* MUSIC */

        const music = document.getElementById("bgm")
        const disk = document.getElementById("disk")
        const btn = document.getElementById("playBtn")

        function toggleMusic() {

            if (music.paused) {

                music.play()
                disk.style.animationPlayState = "running"
                btn.innerHTML = "Pause"

            } else {

                music.pause()
                disk.style.animationPlayState = "paused"
                btn.innerHTML = "Play"

            }

        }

        /* HEART FLOAT */

        function heart() {

            let e = document.createElement("div")

            e.className = "heart"

            let items = ["❤️", "💖", "💘", "💕"]

            e.innerHTML = items[Math.floor(Math.random() * items.length)]

            e.style.left = Math.random() * 100 + "vw"

            e.style.fontSize = (15 + Math.random() * 20) + "px"

            e.style.animationDuration = (4 + Math.random() * 4) + "s"

            document.body.appendChild(e)

            setTimeout(() => e.remove(), 8000)

        }

        setInterval(heart, 400)

        /* FLOWER */

        function flower() {

            let e = document.createElement("div")

            e.className = "flower"

            let items = ["🌸", "🍀", "🌺", "💮", "🍁"]

            e.innerHTML = items[Math.floor(Math.random() * items.length)]

            e.style.left = Math.random() * 100 + "vw"

            e.style.animationDuration = (5 + Math.random() * 4) + "s"

            document.body.appendChild(e)

            setTimeout(() => e.remove(), 9000)

        }

        setInterval(flower, 900)

        /* SPARKLE */

        for (let i = 0; i < 60; i++) {

            let s = document.createElement("div")

            s.className = "spark"

            s.style.left = Math.random() * 100 + "vw"
            s.style.top = Math.random() * 100 + "vh"

            s.style.animationDuration = (2 + Math.random() * 3) + "s"

            document.body.appendChild(s)

        }

    </script>

</body>

</html>
