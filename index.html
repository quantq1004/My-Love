<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>💝 My Love Code for WT 💝</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* GLOBAL */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
background:
radial-gradient(circle at 20% 30%,#2b1055,#000000 60%),
radial-gradient(circle at 80% 70%,#3c1361,#000000 70%);
}

/* STARS */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
opacity:0.8;
}

/* SHOOTING STAR */

.shooting{
position:fixed;
width:2px;
height:2px;
background:white;
box-shadow:0 0 10px white;
animation:shoot 3s linear infinite;
}

@keyframes shoot{

0%{
transform:translateX(-100vw) translateY(0);
opacity:1;
}

100%{
transform:translateX(100vw) translateY(200px);
opacity:0;
}

}

/* HERO */

.hero{
padding:120px 20px;
background:linear-gradient(180deg,transparent,rgba(0,0,0,0.4));
}

.hero h1{
font-size:50px;
animation:fadeUp 2s ease;
}

.hero p{
opacity:0.8;
font-size:20px;
animation:fadeUp 3s ease;
}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* CONTAINER */

.container{
max-width:1000px;
margin:auto;
padding:60px 20px;
}

/* HEART */

.heart-main{
width:200px;
animation:heartbeat 1.3s infinite;
filter:drop-shadow(0 0 25px #ff4d6d);
}

@keyframes heartbeat{

0%{transform:scale(1)}
25%{transform:scale(1.1)}
40%{transform:scale(1)}
60%{transform:scale(1.1)}
100%{transform:scale(1)}

}

/* TIMER */

.timer{
margin-top:20px;
font-size:20px;
background:rgba(255,255,255,0.15);
display:inline-block;
padding:10px 25px;
border-radius:25px;
backdrop-filter:blur(10px);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}

/* CARD */

.card{
background:white;
color:black;
border-radius:14px;
padding:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.card img{
width:100%;
border-radius:10px;
}

/* HEART FLOAT */

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:floatUp linear forwards;
}

@keyframes floatUp{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* FLOWERS */

.flower{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* MUSIC PLAYER */

.music{
position:fixed;
bottom:20px;
right:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:12px 18px;
border-radius:30px;
display:flex;
gap:10px;
align-items:center;
}

.disk{
width:45px;
height:45px;
border-radius:50%;
background:url("preview/disks.png");
background-size:cover;
animation:spin 5s linear infinite;
animation-play-state:paused;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

.play{
background:#ff4d6d;
border:none;
padding:6px 12px;
border-radius:20px;
color:white;
cursor:pointer;
}

/* CREDIT */

.credit{
margin-top:60px;
opacity:0.7;
font-size:14px;
}

</style>

</head>

<body>

<!-- HERO -->

<div class="hero">

<h1>❤️ Dành cho em iu xinh đẹp của anh ❤️</h1>
<p>✨ Romantic coding collection ✨</p>

</div>

<div class="container">

<img class="heart-main" src="preview/heart-main.png">

<h2>✨ My Love - Quỳnh Trang ✨</h2>

<div id="timer" class="timer"></div>

<p>🌸 Những điều nhỏ anh viết cho em 🌸</p>

<div class="grid">

<div class="card">
<a href="wt/001/" target="_blank">
<img src="preview/001.png">
<h3>💌 001 Love Letter</h3>
</a>
</div>

<div class="card">
<h3>Coming soon 🌸</h3>
</div>

</div>

<div class="credit">
Created with ❤️ by <b>Anh iuu của em - QT</b>
</div>

</div>

<!-- MUSIC -->

<div class="music">

<div id="disk" class="disk"></div>

<div>Perfect 🎵</div>

<button id="playBtn" class="play" onclick="toggleMusic()">
Play
</button>

</div>

<audio id="bgm" loop>
<source src="audio/Perfect.mp3">
</audio>

<script>

/* TIMER */

var start = new Date("2026-03-12T00:00:00")

function update(){

var now = new Date()

var diff = now - start

var d = Math.floor(diff / 1000 / 60 / 60 / 24)
var h = Math.floor(diff / 1000 / 60 / 60) % 24
var m = Math.floor(diff / 1000 / 60) % 60
var s = Math.floor(diff / 1000) % 60

document.getElementById("timer").innerHTML =

"<div style='font-size:20px;margin-bottom:6px'>Quang Quân ❤️ Quỳnh Trang</div>" +

"<div style='font-size:16px;opacity:0.9;margin-bottom:10px'>Kỷ niệm từ: 12-03-2026</div>" +

"<div style='font-size:22px;font-weight:bold'>" +

d + " ngày • " +

h + " giờ • " +

m + " phút • " +

s + " giây" +

"</div>"

}
setInterval(update,1000)
update()

/* MUSIC */

const music=document.getElementById("bgm")
const disk=document.getElementById("disk")
const btn=document.getElementById("playBtn")

function toggleMusic(){

if(music.paused){

music.play()
disk.style.animationPlayState="running"
btn.innerHTML="Pause"

}else{

music.pause()
disk.style.animationPlayState="paused"
btn.innerHTML="Play"

}

}

/* HEART FLOAT */

function heart(){

let e=document.createElement("div")

e.className="heart"

let items=["❤️","💖","💘","💕"]

e.innerHTML=items[Math.floor(Math.random()*items.length)]

e.style.left=Math.random()*100+"vw"

e.style.fontSize=(15+Math.random()*20)+"px"

e.style.animationDuration=(4+Math.random()*4)+"s"

document.body.appendChild(e)

setTimeout(()=>e.remove(),8000)

}

setInterval(heart,300)

/* FLOWERS */

function flower(){

let e=document.createElement("div")

e.className="flower"

let items=["🌸","🍀","🌺","💮"]

e.innerHTML=items[Math.floor(Math.random()*items.length)]

e.style.left=Math.random()*100+"vw"

e.style.animationDuration=(4+Math.random()*5)+"s"

document.body.appendChild(e)

setTimeout(()=>e.remove(),9000)

}

setInterval(flower,800)

/* HEART EXPLOSION */

document.addEventListener("click",e=>{

for(let i=0;i<12;i++){

let h=document.createElement("div")

h.className="heart"

h.innerHTML="💖"

h.style.left=e.clientX+"px"
h.style.top=e.clientY+"px"
h.style.bottom="auto"

h.style.animationDuration="2s"

document.body.appendChild(h)

setTimeout(()=>h.remove(),2000)

}

})

/* STARS */

for(let i=0;i<80;i++){

let s=document.createElement("div")
s.className="star"

s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"

document.body.appendChild(s)

}

/* SHOOTING STAR */

setInterval(()=>{

let s=document.createElement("div")
s.className="shooting"

s.style.top=Math.random()*50+"vh"

document.body.appendChild(s)

setTimeout(()=>s.remove(),3000)

},6000)

</script>

</body>
</html>
