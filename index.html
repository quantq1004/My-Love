<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>💝 My Love Code for WT 💝</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
color:white;
text-align:center;
}

/* HERO */

.hero{
background:linear-gradient(135deg,#56CCF2,#2F80ED);
padding:100px 20px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

.hero h1{
font-size:46px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
opacity:0.9;
}

/* CONTAINER */

.container{
max-width:1000px;
margin:auto;
padding:60px 20px;
}

/* HEART IMAGE */

.heart-main{

width:200px;
animation:heartbeat 1.2s infinite;
filter:drop-shadow(0 0 15px #ff4d6d);
transition:0.3s;

}

.heart-main:hover{

transform:scale(1.15);
filter:drop-shadow(0 0 35px #ff4d6d);

}

@keyframes heartbeat{

0%{transform:scale(1)}
25%{transform:scale(1.1)}
40%{transform:scale(1)}
60%{transform:scale(1.1)}
100%{transform:scale(1)}

}

/* TIMER */

.timer{

margin-top:15px;
font-size:20px;
font-weight:bold;

background:rgba(255,255,255,0.2);

display:inline-block;

padding:10px 20px;

border-radius:20px;

backdrop-filter:blur(10px);

box-shadow:0 5px 20px rgba(0,0,0,0.2);

}

/* TITLE */

.section-title{
font-size:28px;
margin-top:40px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}

/* CARD */

.card{

background:white;
border-radius:14px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:0.3s;

}

.card:hover{

transform:translateY(-10px) scale(1.03);
box-shadow:0 20px 40px rgba(0,0,0,0.25);

}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
color:#ff4d6d;
margin-top:10px;
}

.card a{
text-decoration:none;
}

/* MUSIC PLAYER */

.music{

position:fixed;
right:20px;
bottom:20px;

background:white;
color:#333;

padding:10px 15px;
border-radius:30px;

display:flex;
align-items:center;
gap:10px;

box-shadow:0 5px 20px rgba(0,0,0,0.2);

}

/* DISK */

.disk{

width:45px;
height:45px;

border-radius:50%;

background:url("preview/disks.png");
background-size:cover;
background-position:center;

animation:spin 4s linear infinite;
animation-play-state:paused;

}

@keyframes spin{

from{transform:rotate(0)}
to{transform:rotate(360deg)}

}

.song{
font-size:14px;
}

/* BUTTON */

.play{

background:#ff4d6d;
border:none;
color:white;
padding:6px 12px;
border-radius:20px;
cursor:pointer;

}

.play:hover{
opacity:0.8;
}

/* FLOWERS & HEART FALL */

.fall{

position:fixed;
top:-10px;
font-size:20px;

animation:fall linear forwards;

}

@keyframes fall{

to{
transform:translateY(110vh);
}

}

</style>

</head>

<body>

<!-- HERO -->

<div class="hero">

<h1>❤️ Dành cho em iu xinh đẹp của anh ❤️</h1>

<p>✨ Romantic coding collection ✨</p>

</div>

<!-- CONTENT -->

<div class="container">

<img class="heart-main" src="preview/heart-main.png">

<h2>✨ My Love - Quỳnh Trang ✨</h2>

<div id="timer" class="timer"></div>

<p>🌺 Một vài điều nhỏ anh viết cho em 🌺</p>

<div class="section-title">💖 Our Memories 💖</div>

<div class="grid">

<div class="card">
<a href="wt/001/">
<img src="preview/001.png">
<h3>001 💌</h3>
</a>
</div>

<div class="card">
<h3>Coming soon 🌸</h3>
</div>

<div class="card">
<h3>Coming soon 💖</h3>
</div>

<!-- <div class="card">
<a href="wt/002/">
<img src="preview/002.png">
<h3>002 🌸</h3>
</a>
</div>

<div class="card">
<a href="wt/003/">
<img src="preview/003.png">
<h3>003 💖</h3>
</a>
</div> -->

</div>

</div>

<!-- MUSIC PLAYER -->

<div class="music">

<div class="disk" id="disk"></div>

<div class="song">
Perfect 🎵
</div>

<button class="play" onclick="toggleMusic()">
Play
</button>

</div>
<audio id="bgm" loop autoplay muted>
<source src="audio/Perfect.mp3">
</audio>

<script>

/* TIMER */

var start = new Date("2026-03-12T00:00:00")

function update(){

var now = new Date()

var diff = now - start

var days = Math.floor(diff / 1000 / 60 / 60 / 24)

var hours = Math.floor(diff / 1000 / 60 / 60) % 24

var minutes = Math.floor(diff / 1000 / 60) % 60

var seconds = Math.floor(diff / 1000) % 60

document.getElementById("timer").innerHTML =

"Quang Quân ❤️ Quỳnh Trang<br>" +
"Đã bên nhau: "

+ days + " ngày "

+ hours + " giờ "

+ minutes + " phút "

+ seconds + " giây"

}

update()

setInterval(update,1000)

/* MUSIC */

const music=document.getElementById("bgm")
const disk=document.getElementById("disk")

function toggleMusic(){

if(music.paused){

music.play()
disk.style.animationPlayState="running"

}else{

music.pause()
disk.style.animationPlayState="paused"

}

}

/* FLOWERS + HEART RAIN */

function rain(){

var e=document.createElement("div")

e.className="fall"

var items=["💗", "🍀","💞","🌷", "🥰"]

e.innerHTML=items[Math.floor(Math.random()*items.length)]

e.style.left=Math.random()*100+"vw"

e.style.animationDuration=(3+Math.random()*5)+"s"

document.body.appendChild(e)

setTimeout(()=>e.remove(),8000)

}

setInterval(rain,300)


/* ===== AUTO PLAY FIX ===== */

window.onload=()=>{

music.muted=true

music.play().then(()=>{

disk.style.animationPlayState="running"
btn.innerHTML="Pause"

setTimeout(()=>{
music.muted=false
},500)

}).catch(()=>{})

}
</script>

</body>

</html>
